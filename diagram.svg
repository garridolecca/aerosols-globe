<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#131a2e"/>
    </linearGradient>
    <linearGradient id="nvidiaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#76b900"/>
      <stop offset="100%" stop-color="#a0d911"/>
    </linearGradient>
    <linearGradient id="nasaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0077b6"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="esriGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0079c1"/>
      <stop offset="100%" stop-color="#00a9e0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" fill="url(#bgGrad)" rx="12"/>
  <rect x="1" y="1" width="1098" height="618" fill="none" stroke="rgba(255,255,255,0.06)" rx="12" stroke-width="1"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.5">EARTH IN ACTION: AEROSOLS</text>
  <text x="550" y="56" text-anchor="middle" fill="#94a3b8" font-size="11" letter-spacing="0.8">SYSTEM ARCHITECTURE</text>

  <!-- ════════════════════════════════════ -->
  <!-- ROW 1: DATA SOURCES -->
  <!-- ════════════════════════════════════ -->

  <!-- NASA GEOS-FP Box -->
  <rect x="30" y="80" width="240" height="120" rx="10" fill="rgba(0,119,182,0.08)" stroke="rgba(0,180,216,0.3)" stroke-width="1"/>
  <rect x="30" y="80" width="240" height="28" rx="10" fill="url(#nasaGrad)" opacity="0.15"/>
  <circle cx="50" cy="94" r="8" fill="#00b4d8" opacity="0.3"/>
  <text x="64" y="98" fill="#00b4d8" font-size="10" font-weight="700" letter-spacing="0.8">NASA GEOS-FP</text>
  <text x="45" y="126" fill="#e2e8f0" font-size="11" font-weight="500">Wind Vectors</text>
  <text x="45" y="142" fill="#94a3b8" font-size="9">U10M, V10M (10m wind components)</text>
  <text x="45" y="160" fill="#e2e8f0" font-size="11" font-weight="500">Aerosol Concentration</text>
  <text x="45" y="176" fill="#94a3b8" font-size="9">BCSMASS, DUSMASS, SSSMASS, OCSMASS, SO4SMASS</text>
  <text x="45" y="192" fill="#64748b" font-size="8">0.25° global | 3-hourly | OPeNDAP</text>

  <!-- Arrow 1 -->
  <line x1="270" y1="140" x2="320" y2="140" stroke="#00b4d8" stroke-width="1.5" opacity="0.5"/>
  <polygon points="320,136 330,140 320,144" fill="#00b4d8" opacity="0.5"/>

  <!-- PYTHON PROCESSING Box -->
  <rect x="335" y="80" width="200" height="120" rx="10" fill="rgba(124,58,237,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <rect x="335" y="80" width="200" height="28" rx="10" fill="url(#purpleGrad)" opacity="0.15"/>
  <circle cx="355" cy="94" r="8" fill="#a78bfa" opacity="0.3"/>
  <text x="369" y="98" fill="#a78bfa" font-size="10" font-weight="700" letter-spacing="0.8">PYTHON PIPELINE</text>
  <text x="350" y="126" fill="#e2e8f0" font-size="11" font-weight="500">Aerosol Flux Computation</text>
  <text x="350" y="142" fill="#94a3b8" font-size="9">flux = wind x norm(concentration)</text>
  <text x="350" y="162" fill="#e2e8f0" font-size="11" font-weight="500">PNG Encoding</text>
  <text x="350" y="178" fill="#94a3b8" font-size="9">U→Red, V→Green, Mag→Blue</text>
  <text x="350" y="192" fill="#64748b" font-size="8">xarray | NumPy | Pillow</text>

  <!-- Arrow 2 -->
  <line x1="535" y1="140" x2="585" y2="140" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="585,136 595,140 585,144" fill="#a78bfa" opacity="0.5"/>

  <!-- PNG DATA Box -->
  <rect x="600" y="80" width="160" height="120" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="600" y="80" width="160" height="28" rx="10" fill="rgba(255,255,255,0.05)"/>
  <text x="680" y="98" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700" letter-spacing="0.8">PNG DATA FILES</text>
  <text x="615" y="124" fill="#ef4444" font-size="9">&#9632;</text><text x="628" y="124" fill="#94a3b8" font-size="9">composite.png (112 KB)</text>
  <text x="615" y="140" fill="#f59e0b" font-size="9">&#9632;</text><text x="628" y="140" fill="#94a3b8" font-size="9">black_carbon.png (107 KB)</text>
  <text x="615" y="156" fill="#d4a03c" font-size="9">&#9632;</text><text x="628" y="156" fill="#94a3b8" font-size="9">dust.png (100 KB)</text>
  <text x="615" y="172" fill="#3b82f6" font-size="9">&#9632;</text><text x="628" y="172" fill="#94a3b8" font-size="9">sea_salt.png (103 KB)</text>
  <text x="615" y="192" fill="#64748b" font-size="8">360x181 px | 1° resolution</text>

  <!-- Arrow 3 (down to GPU) -->
  <line x1="680" y1="200" x2="680" y2="240" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <polygon points="676,240 680,250 684,240" fill="rgba(255,255,255,0.3)"/>

  <!-- GitHub Pages -->
  <rect x="820" y="80" width="240" height="120" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="820" y="80" width="240" height="28" rx="10" fill="rgba(255,255,255,0.05)"/>
  <text x="940" y="98" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700" letter-spacing="0.8">DEPLOYMENT</text>
  <text x="835" y="124" fill="#e2e8f0" font-size="11" font-weight="500">GitHub Pages</text>
  <text x="835" y="140" fill="#94a3b8" font-size="9">Static hosting, CDN-cached</text>
  <text x="835" y="162" fill="#e2e8f0" font-size="11" font-weight="500">ArcGIS Maps SDK 5.0</text>
  <text x="835" y="178" fill="#94a3b8" font-size="9">Dark Gray Vector basemap</text>
  <text x="835" y="192" fill="#64748b" font-size="8">garridolecca.github.io/aerosols-globe</text>

  <!-- ════════════════════════════════════ -->
  <!-- ROW 2: WebGPU PIPELINE (main feature) -->
  <!-- ════════════════════════════════════ -->

  <!-- WebGPU Section Background -->
  <rect x="30" y="255" width="1040" height="200" rx="12" fill="rgba(118,185,0,0.04)" stroke="rgba(118,185,0,0.2)" stroke-width="1"/>

  <!-- WebGPU Header -->
  <rect x="30" y="255" width="1040" height="32" rx="12" fill="rgba(118,185,0,0.08)"/>
  <text x="60" y="276" fill="#76b900" font-size="12" font-weight="700" letter-spacing="1">NVIDIA WebGPU COMPUTE PIPELINE</text>
  <text x="960" y="276" fill="#76b900" font-size="10" font-weight="600">500,000 PARTICLES @ 60 FPS</text>

  <!-- Pass 1: Compute -->
  <rect x="50" y="300" width="220" height="140" rx="8" fill="rgba(118,185,0,0.06)" stroke="rgba(118,185,0,0.25)" stroke-width="1"/>
  <rect x="50" y="300" width="220" height="24" rx="8" fill="rgba(118,185,0,0.12)"/>
  <text x="160" y="316" text-anchor="middle" fill="#76b900" font-size="10" font-weight="700">PASS 1: COMPUTE</text>
  <text x="62" y="340" fill="#e2e8f0" font-size="10" font-weight="500">Particle Advection</text>
  <text x="62" y="356" fill="#94a3b8" font-size="8.5">@compute @workgroup_size(64)</text>
  <text x="62" y="372" fill="#94a3b8" font-size="8.5">textureLoad() wind sampling</text>
  <text x="62" y="388" fill="#94a3b8" font-size="8.5">Decode U/V from PNG texture</text>
  <text x="62" y="404" fill="#94a3b8" font-size="8.5">Stochastic particle recycling</text>
  <text x="62" y="420" fill="#94a3b8" font-size="8.5">Ping-pong storage buffers</text>
  <text x="62" y="434" fill="#64748b" font-size="7.5">7,813 workgroups dispatched</text>

  <!-- Arrow -->
  <line x1="270" y1="370" x2="300" y2="370" stroke="#76b900" stroke-width="1.5" opacity="0.4" filter="url(#softGlow)"/>
  <polygon points="300,366 310,370 300,374" fill="#76b900" opacity="0.5"/>

  <!-- Pass 2: Fade -->
  <rect x="315" y="300" width="210" height="140" rx="8" fill="rgba(118,185,0,0.06)" stroke="rgba(118,185,0,0.25)" stroke-width="1"/>
  <rect x="315" y="300" width="210" height="24" rx="8" fill="rgba(118,185,0,0.12)"/>
  <text x="420" y="316" text-anchor="middle" fill="#76b900" font-size="10" font-weight="700">PASS 2: FADE</text>
  <text x="327" y="340" fill="#e2e8f0" font-size="10" font-weight="500">Trail Effect</text>
  <text x="327" y="356" fill="#94a3b8" font-size="8.5">Full-screen triangle blit</text>
  <text x="327" y="372" fill="#94a3b8" font-size="8.5">Previous frame at reduced alpha</text>
  <text x="327" y="388" fill="#94a3b8" font-size="8.5">Ping-pong render targets</text>
  <text x="327" y="404" fill="#94a3b8" font-size="8.5">Configurable fade opacity</text>
  <text x="327" y="434" fill="#64748b" font-size="7.5">Creates smooth flowing trails</text>

  <!-- Arrow -->
  <line x1="525" y1="370" x2="555" y2="370" stroke="#76b900" stroke-width="1.5" opacity="0.4" filter="url(#softGlow)"/>
  <polygon points="555,366 565,370 555,374" fill="#76b900" opacity="0.5"/>

  <!-- Pass 3: Render -->
  <rect x="570" y="300" width="230" height="140" rx="8" fill="rgba(118,185,0,0.06)" stroke="rgba(118,185,0,0.25)" stroke-width="1"/>
  <rect x="570" y="300" width="230" height="24" rx="8" fill="rgba(118,185,0,0.12)"/>
  <text x="685" y="316" text-anchor="middle" fill="#76b900" font-size="10" font-weight="700">PASS 3: RENDER</text>
  <text x="582" y="340" fill="#e2e8f0" font-size="10" font-weight="500">Particle Drawing</text>
  <text x="582" y="356" fill="#94a3b8" font-size="8.5">Instanced quads (6 verts x 500K)</text>
  <text x="582" y="372" fill="#94a3b8" font-size="8.5">SDF circular glow (fragment)</text>
  <text x="582" y="388" fill="#94a3b8" font-size="8.5">Web Mercator projection (vertex)</text>
  <text x="582" y="404" fill="#94a3b8" font-size="8.5">Additive blending (src-alpha + one)</text>
  <text x="582" y="420" fill="#94a3b8" font-size="8.5">Per-species color ramps in WGSL</text>
  <text x="582" y="434" fill="#64748b" font-size="7.5">3M vertices per frame</text>

  <!-- Arrow -->
  <line x1="800" y1="370" x2="830" y2="370" stroke="#76b900" stroke-width="1.5" opacity="0.4" filter="url(#softGlow)"/>
  <polygon points="830,366 840,370 830,374" fill="#76b900" opacity="0.5"/>

  <!-- Pass 4: Screen -->
  <rect x="845" y="300" width="210" height="140" rx="8" fill="rgba(118,185,0,0.06)" stroke="rgba(118,185,0,0.25)" stroke-width="1"/>
  <rect x="845" y="300" width="210" height="24" rx="8" fill="rgba(118,185,0,0.12)"/>
  <text x="950" y="316" text-anchor="middle" fill="#76b900" font-size="10" font-weight="700">PASS 4: SCREEN</text>
  <text x="857" y="340" fill="#e2e8f0" font-size="10" font-weight="500">Composite Output</text>
  <text x="857" y="356" fill="#94a3b8" font-size="8.5">Copy to swapchain canvas</text>
  <text x="857" y="372" fill="#94a3b8" font-size="8.5">Premultiplied alpha mode</text>
  <text x="857" y="388" fill="#94a3b8" font-size="8.5">Transparent overlay on basemap</text>
  <text x="857" y="404" fill="#94a3b8" font-size="8.5">CSS z-index compositing</text>
  <text x="857" y="434" fill="#64748b" font-size="7.5">Final frame to display</text>

  <!-- ════════════════════════════════════ -->
  <!-- ROW 3: OUTPUT -->
  <!-- ════════════════════════════════════ -->

  <!-- Arrow from GPU to Output -->
  <line x1="550" y1="455" x2="550" y2="485" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <polygon points="546,485 550,495 554,485" fill="rgba(255,255,255,0.3)"/>

  <!-- Browser Output -->
  <rect x="180" y="500" width="740" height="100" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="180" y="500" width="740" height="28" rx="10" fill="rgba(255,255,255,0.05)"/>
  <text x="550" y="518" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700" letter-spacing="0.8">BROWSER OUTPUT</text>

  <!-- Output components -->
  <rect x="200" y="540" width="160" height="48" rx="6" fill="rgba(0,121,193,0.08)" stroke="rgba(0,169,224,0.25)" stroke-width="1"/>
  <text x="280" y="560" text-anchor="middle" fill="#00a9e0" font-size="10" font-weight="600">ArcGIS Basemap</text>
  <text x="280" y="576" text-anchor="middle" fill="#94a3b8" font-size="8">Dark Gray Vector (z:0)</text>

  <text x="378" y="566" fill="#64748b" font-size="14">+</text>

  <rect x="400" y="540" width="160" height="48" rx="6" fill="rgba(118,185,0,0.08)" stroke="rgba(118,185,0,0.25)" stroke-width="1"/>
  <text x="480" y="560" text-anchor="middle" fill="#76b900" font-size="10" font-weight="600">WebGPU Particles</text>
  <text x="480" y="576" text-anchor="middle" fill="#94a3b8" font-size="8">500K glow particles (z:2)</text>

  <text x="578" y="566" fill="#64748b" font-size="14">+</text>

  <rect x="600" y="540" width="160" height="48" rx="6" fill="rgba(139,92,246,0.08)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <text x="680" y="560" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">UI Controls</text>
  <text x="680" y="576" text-anchor="middle" fill="#94a3b8" font-size="8">Species, speed, trails (z:10)</text>

  <text x="778" y="566" fill="#64748b" font-size="14">=</text>

  <rect x="800" y="540" width="100" height="48" rx="6" fill="rgba(0,180,216,0.1)" stroke="rgba(0,180,216,0.3)" stroke-width="1" filter="url(#softGlow)"/>
  <text x="850" y="562" text-anchor="middle" fill="#00b4d8" font-size="11" font-weight="700">FINAL</text>
  <text x="850" y="576" text-anchor="middle" fill="#94a3b8" font-size="8">60 FPS</text>

  <!-- Credit -->
  <text x="550" y="612" text-anchor="middle" fill="#475569" font-size="9">Created by Jhonatan Garrido-Lecca | NASA GEOS-FP | NVIDIA WebGPU | ArcGIS Maps SDK 5.0</text>
</svg>
